version: '3.9'

services:
  db:
    image: postgres:15-alpine
    container_name: yashilqollar-db
    restart: always
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: yashilqollar-redis
    restart: always

  web:
    container_name: yashilqollar-web
    build:
      context: .
      dockerfile: Dockerfile.web
    volumes:
      - .:/usr/src/app
    environment:
      - PYTHONPATH=/usr/src/app
      - POSTGRES_HOST=db
      - BOT_TOKEN=твои_токен_сюда
      - ADMINS=твой_id
    command: >
      sh -c "python manage.py migrate && 
             python manage.py collectstatic --noinput && 
             python manage.py runserver 0.0.0.0:8000"
    depends_on:
      db:
        condition: service_healthy

  bot:
    container_name: yashilqollar-bot
    build:
      context: .
      dockerfile: Dockerfile.bot
    volumes:
      - .:/usr/src/app
    environment:
      - PYTHONPATH=/usr/src/app
      - BOT_TOKEN=твой_токен_сюда
      - ADMINS=твой_id
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    command: python bot.py
    depends_on:
      db:
        condition: service_healthy
      web:
        condition: service_started

volumes:
  postgres_data: