version: '3.9'

services:
  db:
    image: postgres:15.0-alpine
    container_name: yashilqollar-db
    restart: always
    # ЖЕСТКО ЗАДАЕМ ПЕРЕМЕННЫЕ ТУТ
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - 5433:5432

  web:
    container_name: yashilqollar-web
    build:
      dockerfile: Dockerfile.web
      context: .
    working_dir: "/usr/src/app/web"
    volumes:
      - .:/usr/src/app/web
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    command: sh -c "python manage.py migrate &&
              python manage.py collectstatic --noinput &&
              python manage.py runserver 0.0.0.0:8000"
    ports:
      - 8000:8000
    restart: always
    depends_on:
      - db
      - redis

  bot:
    container_name: yashilqollar-bot
    build:
      dockerfile: Dockerfile.bot
      context: .
    working_dir: "/usr/src/app/tg_bot"
    volumes:
      - .:/usr/src/app/tg_bot
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    command: python bot.py
    restart: always
    depends_on:
      - db
      - redis
      - web

  redis:
    container_name: yashilqollar-redis
    image: redis:7.2-rc3-alpine
    restart: always
    ports:
      - 6379:6379
    volumes:
      - redis_data:/data

  adminer:
    image: adminer
    restart: always
    ports:
      - 8080:8080

volumes:
  postgres_data:
  redis_data: